on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: go-task/setup-task@v1
        with:
          version: "3.37"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: task check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: go-task/setup-task@v1
        with:
          version: "3.37"
      - run: task test
