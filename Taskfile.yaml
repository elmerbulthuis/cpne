# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  OVERLAYS:
    - hello
    - crd

tasks:
  install:
    desc: Install everything
    cmds:
      - task: install:npm

  check:
    desc: Check everything
    cmds:
      - task: check:formatting
      - task: check:spelling
      - task: check:trivy-kubernetes

  fix:
    desc: Fix everything
    cmds:
      - task: fix:formatting

  build:
    desc: Build everything
    cmds:
      - task: build:kubernetes

  test:
    desc: Test everything
    cmds:
      - task: test:kubernetes-dry-run

  install:npm:
    run: once
    desc: Install Node.js dependencies
    sources:
      - package-lock.json
    generates:
      - node_modules/**/*
    cmds:
      - npm clean-install

  check:trivy-kubernetes:
    deps:
      - build:kubernetes
    cmds:
      - >
        trivy config --exit-code 1 dist/kubernetes-*.yaml

  check:formatting:
    desc: Check formatting
    deps:
      - install:npm
    cmds:
      - npm run formatting

  check:spelling:
    desc: Check spelling
    deps:
      - install:npm
    cmds:
      - npm run spelling

  fix:formatting:
    desc: Fix formatting
    deps:
      - install:npm
    cmds:
      - npm run fix-formatting

  build:kubernetes:
    run: once
    desc: Build Kubernetes manifests
    sources:
      - infrastructure/kubernetes/**/*
    generates:
      - dist/kubernetes-*.yaml
    cmds:
      - mkdir -p dist
      - for:
          var: OVERLAYS
          as: OVERLAY
        cmd: >
          kustomize build
          --output dist/kubernetes-{{.OVERLAY}}.yaml
          infrastructure/kubernetes/overlays/{{.OVERLAY}}

  test:kubernetes-dry-run:
    deps:
      - build:kubernetes
    cmds:
      - for:
          var: OVERLAYS
          as: OVERLAY
        cmd: >
          kubectl apply -f dist/kubernetes-{{.OVERLAY}}.yaml --dry-run=client
