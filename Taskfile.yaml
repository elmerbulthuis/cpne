# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  OVERLAYS:
    - local

tasks:
  install:
    desc: Install everything
    cmds:
      - task: install:npm

  audit:
    desc: Audit everything
    cmds:
      - task: audit:trivy-kubernetes

  check:
    desc: Check everything
    cmds:
      - task: check:formatting
      - task: check:spelling

  test:
    desc: Test everything
    cmds: []

  fix:
    desc: Fix everything
    cmds:
      - task: fix:formatting

  build:
    desc: Build everything
    cmds:
      - task: build:kubernetes

  install:npm:
    run: once
    desc: Install Node.js dependencies
    sources:
      - package-lock.json
    generates:
      - node_modules/**/*
    cmds:
      - npm clean-install

  audit:trivy-kubernetes:
    deps:
      - build:kubernetes
    cmds:
      - >
        trivy config dist/kubernetes-*.yaml

  check:formatting:
    desc: Check formatting
    deps:
      - install:npm
    cmds:
      - npm run formatting

  check:spelling:
    desc: Check spelling
    deps:
      - install:npm
    cmds:
      - npm run spelling

  fix:formatting:
    desc: Fix formatting
    deps:
      - install:npm
    cmds:
      - npm run fix-formatting

  build:kubernetes:
    run: once
    desc: Build Kubernetes manifests
    sources:
      - infrastructure/kubernetes/**/*
    generates:
      - dist/kubernetes-*.yaml
    cmds:
      - mkdir -p dist
      - for:
          var: OVERLAYS
          as: OVERLAY
        cmd: >
          kustomize build
          --output dist/kubernetes-{{.OVERLAY}}.yaml
          infrastructure/kubernetes/overlays/{{.OVERLAY}}
